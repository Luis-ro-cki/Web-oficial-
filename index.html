<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bot Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>🤖 WhatsBot Server</header>
    <div class="container">
        <div class="sidebar">
            <h3>Mis Bots</h3>
            <ul id="bot-list">
                <li>Bot Principal - <span class="status online">Activo</span></li>
            </ul>
            <button onclick="connectNewBot()">+ Conectar Nuevo Bot</button>
        </div>
        <div class="main-content">
            <div class="card">
                <h2>Estado del Bot</h2>
                <div class="status online" id="status">✅ Conectado</div>
                <p id="phone">Número: Cargando...</p>
            </div>
            
            <div class="card">
                <h2>Código QR</h2>
                <div id="qr-code">Esperando QR...</div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
